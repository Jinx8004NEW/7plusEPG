name: Update EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - "data/epg.json"

permissions:
  contents: write

concurrency:
  group: epg-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch guide
        run: python fetch_epg.py

      - name: Commit if changed
        run: |
          git config user.name  "epg-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/epg.json
          if git diff --staged --quiet; then
            echo "No guide changes."
          else
            git commit -m "Update EPG $(date -u +%FT%TZ)"
            git push
          fi